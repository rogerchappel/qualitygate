name: QualityGate Example

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qualitygate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npx qualitygate run
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: qualitygate-report
          path: |
            QUALITY_REPORT.md
            quality-report.json
